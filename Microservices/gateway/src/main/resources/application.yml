server:
  port: 8443
  forward-headers-strategy: framework
  ssl:
    enabled: true
    key-store: file:/certs/shared.p12
    key-store-type: PKCS12
    key-store-password: ${GATEWAY_KEYSTORE_PASSWORD:changeit}
    key-alias: ${GATEWAY_KEY_ALIAS:shared}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # ============ AUTH SERVICE ROUTES ============
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        # ============ USER SERVICE ROUTES ============
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=0

        # ============ GRAPH SERVICE ROUTES ============
        # graph endpoints
        - id: graph-service
          uri: lb://GRAPH-SERVICE
          predicates:
            - Path=/graph/**
          filters:
            - StripPrefix=0

        # ============ PAYMENT SERVICE ROUTES ============
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payment/**
          filters:
            - StripPrefix=0

        # ============ TRAVEL SERVICE ROUTES ============
        - id: travel-service
          uri: lb://TRAVEL-SERVICE
          predicates:
            - Path=/travel/**
          filters:
            - StripPrefix=0

      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost"
              - "http://localhost:80"
              - "http://localhost:3000"
              - "http://localhost:4200"
              - "https://localhost"
              - "https://localhost:3000"
              - "https://localhost:4200"
              - "https://localhost:8443"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
              - Authorization
              - Content-Type
              - Accept
              - X-Request-Id
            exposedHeaders:
              - Authorization
              - X-Request-Id
            allowCredentials: true
            maxAge: 3600

      # Default filters
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# Eureka Client Configuration
eureka:
  client:
    service-url:
      # In docker-compose we set EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_URI:http://localhost:8761/eureka}}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong12345678901234567890}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} [requestId=%X{requestId}] - %msg%n"
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    smahfood.ecommerce.gateway: DEBUG
