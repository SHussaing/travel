---
- name: Travel Management System (docker-compose) deployment
  hosts: travel
  gather_facts: true

  vars:
    project_root: "{{ playbook_dir }}/.."
    project_name: travel

  tasks:
    - name: Check docker is installed
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Check docker compose is available
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false

    - name: Print docker versions
      ansible.builtin.debug:
        msg:
          - "{{ docker_version.stdout }}"
          - "{{ compose_version.stdout }}"

    - name: Pull/build images
      ansible.builtin.command:
        cmd: docker compose -p {{ project_name }} build
        chdir: "{{ project_root }}"

    - name: Start stack
      ansible.builtin.command:
        cmd: docker compose -p {{ project_name }} up -d
        chdir: "{{ project_root }}"

    - name: Show running containers
      ansible.builtin.command:
        cmd: docker compose -p {{ project_name }} ps
        chdir: "{{ project_root }}"
      register: compose_ps
      changed_when: false

    - name: Print compose ps
      ansible.builtin.debug:
        var: compose_ps.stdout_lines

