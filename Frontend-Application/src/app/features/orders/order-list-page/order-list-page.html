<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-900">Orders</h1>
      <a routerLink="/" class="text-sm text-indigo-600 hover:underline">Shop</a>
    </div>

    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700">Search</label>
          <input [(ngModel)]="q" name="q" type="text" placeholder="Order id or product..."
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Status</label>
          <select [(ngModel)]="status" name="status" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
            <option value="">All</option>
            <option value="CONFIRMED">CONFIRMED</option>
            <option value="SHIPPED">SHIPPED</option>
            <option value="COMPLETED">COMPLETED</option>
            <option value="CANCELLED">CANCELLED</option>
          </select>
        </div>
        <div class="md:col-span-3">
          <button (click)="search()" class="px-4 py-2 bg-indigo-600 text-white rounded-md">Search</button>
        </div>
      </div>
    </div>

    @if (isLoading()) {
      <div class="flex justify-center items-center py-12">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
      </div>
    }

    @if (errorMessage()) {
      <div class="rounded-md bg-red-50 p-4 mb-4">
        <p class="text-sm text-red-800">{{ errorMessage() }}</p>
      </div>
    }

    @if (!isLoading() && orders().length === 0) {
      <div class="bg-white rounded-lg shadow p-8 text-center">
        <p class="text-gray-600">No orders found.</p>
      </div>
    }

    <div class="space-y-3">
      @for (o of orders(); track o.id) {
        <a [routerLink]="['/orders', o.id]" class="block bg-white rounded-lg shadow p-4 hover:shadow-md">
          <div class="flex items-center justify-between">
            <div>
              <div class="font-semibold text-gray-900">Order #{{ o.id }}</div>
              <div class="text-sm text-gray-600">{{ o.createdAt | date:'medium' }}</div>
            </div>
            <div class="text-right">
              <div class="text-sm"><span class="px-2 py-1 rounded bg-gray-100">{{ o.status }}</span></div>
              <div class="mt-1 font-semibold">${{ o.totalAmount.toFixed(2) }}</div>
            </div>
          </div>
        </a>
      }
    </div>
  </div>
</div>
