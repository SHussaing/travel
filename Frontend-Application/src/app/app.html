<div class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3">
      <a class="text-lg font-semibold" routerLink="/">Travel Admin</a>

      <nav class="hidden items-center gap-3 text-sm md:flex">
        <a class="hover:underline" routerLink="/admin">Dashboard</a>
        <a class="hover:underline" routerLink="/admin/users">Users</a>
        <a class="hover:underline" routerLink="/admin/travels">Travels</a>
        <a class="hover:underline" routerLink="/admin/payments">Payments</a>
        <a class="hover:underline" routerLink="/admin/graph">Graph</a>
      </nav>

      <div class="flex items-center gap-2 text-sm">
        <span class="hidden text-slate-600 sm:inline" *ngIf="authState.subject()">{{ authState.subject() }}</span>
        <button
          class="rounded-md border px-3 py-1.5 text-sm hover:bg-slate-50"
          *ngIf="authState.token()"
          (click)="logout()"
          type="button"
        >
          Logout
        </button>
        <a class="rounded-md border px-3 py-1.5 text-sm hover:bg-slate-50" *ngIf="!authState.token()" routerLink="/login">
          Login
        </a>
      </div>
    </div>

    <nav class="mx-auto flex max-w-6xl gap-3 overflow-auto px-4 pb-3 text-sm md:hidden">
      <a class="hover:underline" routerLink="/admin">Dashboard</a>
      <a class="hover:underline" routerLink="/admin/users">Users</a>
      <a class="hover:underline" routerLink="/admin/travels">Travels</a>
      <a class="hover:underline" routerLink="/admin/payments">Payments</a>
      <a class="hover:underline" routerLink="/admin/graph">Graph</a>
    </nav>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6">
    <router-outlet />
  </main>

  <app-toast-host />
</div>
