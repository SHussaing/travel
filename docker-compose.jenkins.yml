services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins.Dockerfile
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"       # Jenkins web UI
      - "50000:50000"     # Jenkins agent port
    volumes:
      # Persist Jenkins data - mount at same path for Docker volume compatibility
      - jenkins_home:/var/jenkins_home
      # Docker Desktop (Windows) named pipe for Linux engine (Docker-out-of-Docker)
      - //./pipe/dockerDesktopLinuxEngine://./pipe/dockerDesktopLinuxEngine
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    restart: unless-stopped
    networks:
      - jenkins-net

volumes:
  jenkins_home:

networks:
  jenkins-net:
    driver: bridge
