networks:
  travelms-network:
    driver: bridge

  database-network:
    driver: bridge

  monitoring-network:
    driver: bridge


volumes:
  postgres_data:
  elasticsearch_data:
  neo4j_data:
  redis_data:
  jenkins_home:
  sonarqube_data:
  prometheus_data:
  grafana_data:
  minio_data:
  vault_data:
  vault_logs:


services:

  # =========================
  # SERVICE REGISTRY
  # =========================
  registry-service:
    build:
      context: .
      dockerfile: services/registry-service/Dockerfile
    container_name: registry-service
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - travelms-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


  # =========================
  # DATABASE
  # =========================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - database-network
      - travelms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - redis_data:/data
    networks:
      - travelms-network


  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9001:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - travelms-network


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - database-network
      - travelms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s


  neo4j:
    image: neo4j:5.13-community
    container_name: neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/neo4j123}
    volumes:
      - neo4j_data:/data
    networks:
      - travelms-network


  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - travelms-network


  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    depends_on:
      - zookeeper
    networks:
      - travelms-network


  # =========================
  # MICROSERVICES (ALL HTTP INTERNAL)
  # =========================

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    ports:
      - "9082:9082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=user_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - EUREKA_SERVER_URL=http://registry-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travelms-network


  travel-service:
    build:
      context: .
      dockerfile: services/travel-service/Dockerfile
    container_name: travel-service
    ports:
      - "9083:9083"
    restart: on-failure:30
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=travel_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_ELASTICSEARCH_ENABLED=false
      - SPRING_DATA_ELASTICSEARCH_REPOSITORIES_ENABLED=false
      - EUREKA_SERVER_URL=http://registry-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - travelms-network


  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "9084:9084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=payment_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - EUREKA_SERVER_URL=http://registry-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travelms-network


  feedback-service:
    build:
      context: .
      dockerfile: services/feedback-service/Dockerfile
    container_name: feedback-service
    ports:
      - "9085:9085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=feedback_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - EUREKA_SERVER_URL=http://registry-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travelms-network


  # =========================
  # GATEWAY (ONLY HTTPS ENTRY POINT)
  # =========================
  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: gateway-service

    ports:
      - "9080:9080"

    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_SERVER_URL=http://registry-service:8761/eureka/
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    depends_on:
      registry-service:
        condition: service_started

    networks:
      - travelms-network


  # =========================
  # FRONTEND (ANGULAR)
  # =========================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - gateway-service
    networks:
      - travelms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
