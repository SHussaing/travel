---
# Test Profile
spring:
  config:
    activate:
      on-profile: test

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  data:
    elasticsearch:
      repositories:
        enabled: true

logging:
  level:
    com.travelms.travel: DEBUG

